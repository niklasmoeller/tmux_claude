# vim:set ft=tmux:
# Catppuccin module: claude_tokens
# Shows 5h/7d Claude token usage in the Catppuccin status bar.
#
# This file is a template. SCRIPTS_DIR and CATPPUCCIN_UTILS are substituted
# by tmux-claude.tmux at runtime — do not source this file directly.
#
# To use: add to your tmux.conf status-right:
#   set -ag status-right "#{E:@catppuccin_status_claude_tokens}"

%hidden MODULE_NAME="claude_tokens"

set -gu "@catppuccin_status_${MODULE_NAME}_icon_fg"
set -gu "@catppuccin_status_${MODULE_NAME}_icon_bg"
set -gu "@catppuccin_status_${MODULE_NAME}_text_fg"
set -gu "@catppuccin_status_${MODULE_NAME}_text_bg"

set -gq "@catppuccin_${MODULE_NAME}_icon" " "
set -gqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_red}"
set -gqF "@catppuccin_${MODULE_NAME}_text" "#{l:#{@claude_tokens}}"

source -F "#{d:current_file}/../../tmux/utils/status_module.conf"
